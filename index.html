<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обжарщик</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
        }

        .left-panel {
            width: 50%;
            padding: 20px;
            background-color: #f5f5f5;
            overflow-y: auto;
        }

        .right-panel {
            width: 50%;
            height: 100vh;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        ul {
            list-style-type: none;
        }

        li {
            padding: 10px;
            margin-bottom: 10px;
            background-color: transparent;
            border-radius: 0;
            box-shadow: none;
        }

        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="left-panel">
        <h1>Обжарщик</h1>
        <ul>
            <li>Торрефакто (Torrefacto)</li>
            <li>Кофеин (Coffee In)</li>
            <li>Чёрный (Black Coffee)</li>
            <li>Doublesby (Даблби)</li>
            <li>Skuratov Coffee</li>
            <li>Roast & Post</li>
            <li>Verlet Coffee Roasters</li>
            <li>Bravos Coffee</li>
            <li>Lee Coffee</li>
            <li>Академия Кофе</li>
        </ul>
    </div>

    <div class="right-panel">
        <div id="map"></div>
    </div>

    <script src="https://api-maps.yandex.ru/2.1/?apikey=&lang=ru_RU"></script>
    <script>
        ymaps.ready(init);

        function init() {
            var myMap = new ymaps.Map("map", {
                center: [55.705146, 37.694324], // Координаты ул. Гурьянова д.29 к.2
                zoom: 16
            });

            var myPlacemark = new ymaps.Placemark([55.705146, 37.694324], {
                hintContent: 'ул. Гурьянова д.29 к.2',
                balloonContent: 'ул. Гурьянова д.29 к.2'
            });

            myMap.geoObjects.add(myPlacemark);
        }
    </script>
</body>
</html>
