<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обжарщик</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
        }

        .left-panel {
            width: 30vw;
            height:100vh;
            padding: 20px;
            background-color: #f5f5f5;
        }

        
        #map {
            width: 100vw;
            height: 100vh;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        ul {
            list-style-type: none;
        }

        li {
            padding: 10px;
            margin-bottom: 10px;
            background-color: transparent;
            border-radius: 0;
            box-shadow: none;
        }

    </style>
    <script src="https://api-maps.yandex.ru/v3/?apikey=d0505243-8add-4f93-aa0d-5b83e82e814f&lang=ru_RU"></script>
	<script>
        initMap();

        async function initMap() {
            await ymaps3.ready;

            const {YMap, YMapDefaultSchemeLayer} = ymaps3;

            const map = new YMap(
                document.getElementById('map'),
                {
                    location: {
                        center: [37.588144, 55.733842],
                        zoom: 10
                    }
                }
            );

            map.addChild(new YMapDefaultSchemeLayer());
        }
    </script>
</head>
<body>
    <div class="left-panel">
        <h1>Обжарщик</h1>
        <ul>
            <li>Торрефакто (Torrefacto)</li>
            <li>Кофеин (Coffee In)</li>
            <li>Чёрный (Black Coffee)</li>
            <li>Doublesby (Даблби)</li>
            <li>Skuratov Coffee</li>
            <li>Roast & Post</li>
            <li>Verlet Coffee Roasters</li>
            <li>Bravos Coffee</li>
            <li>Lee Coffee</li>
            <li>Академия Кофе</li>
        </ul>
    </div>


        <div id="map"></div>

</body>
</html>
